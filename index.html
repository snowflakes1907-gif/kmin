<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>여행 아카이브 — PP</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden;background:#050A12}
    body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Segoe UI',sans-serif;cursor:grab;user-select:none}
    body.dragging{cursor:grabbing}
    body.add-mode{cursor:crosshair !important}
    body.star-drag{cursor:grabbing !important}

    .header{position:fixed;top:0;left:0;right:0;z-index:100;padding:15px 24px;display:flex;align-items:center;gap:14px;pointer-events:none}
    .header::after{content:'';position:absolute;inset:0;z-index:-1;background:linear-gradient(to bottom,rgba(5,10,18,.85) 0%,transparent 100%)}
    .logo{width:34px;height:34px;border-radius:8px;background:#0A2530;border:1px solid rgba(134,237,255,.22);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#86EDFF;letter-spacing:.4px;pointer-events:auto;cursor:pointer}
    .header-title{font-size:14px;font-weight:500;color:rgba(230,253,255,.85);flex:1}
    .header-stats{display:flex;gap:18px}
    .hstat{font-size:12px;color:rgba(134,237,255,.45)}
    .hstat b{color:#86EDFF;font-weight:600;margin-right:3px}

    #universe-wrap{position:fixed;inset:0;overflow:hidden}
    #universe{position:absolute;top:0;left:0;will-change:transform;transform-origin:0 0}
    #sky{display:block}

    @keyframes twinkle{0%,100%{opacity:var(--op,.3)}50%{opacity:calc(var(--op,.3)*.1)}}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:.22}50%{transform:scale(1.5);opacity:.06}}

    .trip-card{position:fixed;z-index:200;width:214px;background:rgba(4,14,24,.97);border:1px solid rgba(134,237,255,.15);border-radius:16px;padding:17px 19px;pointer-events:auto;transition:opacity .18s ease,transform .18s ease}
    .card-close{display:none;position:absolute;top:10px;right:12px;background:none;border:none;color:rgba(255,255,255,.4);font-size:18px;cursor:pointer;line-height:1;padding:2px 6px}
    @media(pointer:coarse){.card-close{display:block}.trip-card{width:240px}}
    .trip-card.hidden{opacity:0;transform:translateY(6px);pointer-events:none}
    .trip-card.visible{opacity:1;transform:translateY(0)}
    .card-user{display:flex;align-items:center;gap:7px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.06)}
    .card-user-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .card-user-name{font-size:11px;font-weight:600;opacity:.9}
    .card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px}
    .card-country{font-size:10px;letter-spacing:.9px;text-transform:uppercase;color:rgba(200,240,255,.45);margin-bottom:3px}
    .card-name{font-size:16px;font-weight:600;color:#F0FEFF;letter-spacing:-.4px;line-height:1.2}
    .card-status-dot{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0;box-shadow:0 0 5px currentColor}
    .card-when{font-size:11px;color:rgba(160,220,255,.5);margin-bottom:13px}
    .card-divider{height:1px;background:rgba(134,237,255,.07);margin:10px 0 12px}
    .card-nums{display:flex;margin-bottom:13px}
    .cn{flex:1;text-align:center}
    .cn+.cn{border-left:1px solid rgba(134,237,255,.08)}
    .cn-num{font-size:22px;font-weight:600;line-height:1;margin-bottom:3px;letter-spacing:-1px}
    .cn-lbl{font-size:10px;color:rgba(134,237,255,.35)}
    .card-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;text-decoration:none;padding:5px 12px;border-radius:8px;border:1px solid rgba(134,237,255,.22);color:#86EDFF;transition:background .12s,border-color .12s}
    .card-link:hover{background:rgba(134,237,255,.08);border-color:rgba(134,237,255,.4)}
    .card-prefs{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
    .pref-tag{font-size:10px;padding:3px 8px;border-radius:20px;border:1px solid;opacity:.8;letter-spacing:-.2px;white-space:nowrap}
    .card-upcoming{font-size:11px;color:rgba(134,237,255,.4);border:1px solid rgba(134,237,255,.12);padding:5px 12px;border-radius:8px;display:inline-block}
    .card-save-btn{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:10px;width:100%;padding:7px 0;border-radius:8px;border:1px solid rgba(134,237,255,.18);background:transparent;color:rgba(134,237,255,.5);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
    .card-save-btn:hover{background:rgba(134,237,255,.07);border-color:rgba(134,237,255,.35);color:#86EDFF}
    .card-save-btn.saved{background:rgba(134,237,255,.12);border-color:rgba(134,237,255,.45);color:#86EDFF}

    .save-toggle{position:fixed;top:13px;right:24px;z-index:101;display:flex;align-items:center;gap:5px;padding:5px 13px;border-radius:20px;border:1px solid rgba(134,237,255,.18);background:rgba(4,14,24,.8);color:rgba(134,237,255,.5);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;pointer-events:auto;backdrop-filter:blur(6px)}
    .save-toggle:hover{border-color:rgba(134,237,255,.4);color:#86EDFF;background:rgba(134,237,255,.08)}
    .save-toggle .sc{background:rgba(134,237,255,.18);color:#86EDFF;font-weight:700;font-size:10px;border-radius:10px;padding:1px 6px;min-width:18px;text-align:center}

    .saved-panel{position:fixed;top:0;right:0;bottom:0;z-index:300;width:260px;background:rgba(4,14,24,.98);border-left:1px solid rgba(134,237,255,.1);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;pointer-events:auto;backdrop-filter:blur(12px)}
    .saved-panel.open{transform:translateX(0)}
    .saved-panel-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 14px;border-bottom:1px solid rgba(134,237,255,.08);flex-shrink:0}
    .saved-panel-title{font-size:13px;font-weight:600;color:#F0FEFF;letter-spacing:-.2px}
    .saved-panel-close{background:none;border:none;color:rgba(134,237,255,.35);font-size:20px;cursor:pointer;line-height:1;padding:0 2px}
    .saved-panel-close:hover{color:#86EDFF}
    .saved-list{flex:1;overflow-y:auto;padding:10px}
    .saved-empty{text-align:center;padding:40px 16px;color:rgba(134,237,255,.22);font-size:12px;line-height:2}
    .saved-item{padding:13px;border-radius:10px;border:1px solid rgba(134,237,255,.08);margin-bottom:8px;transition:background .12s,border-color .12s}
    .saved-item:hover{background:rgba(134,237,255,.04);border-color:rgba(134,237,255,.18)}
    .saved-item-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
    .saved-item-name{font-size:13px;font-weight:600;color:#F0FEFF;letter-spacing:-.3px}
    .saved-item-rm{background:none;border:none;color:rgba(134,237,255,.2);font-size:15px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0}
    .saved-item-rm:hover{color:rgba(255,90,90,.55)}
    .saved-item-meta{font-size:10px;color:rgba(134,237,255,.38);margin-bottom:8px}
    .saved-item-prefs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px}
    .saved-item-tag{font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid;opacity:.75}
    .saved-item-link{display:inline-flex;align-items:center;font-size:11px;text-decoration:none;padding:4px 10px;border-radius:6px;border:1px solid rgba(134,237,255,.2);color:#86EDFF;transition:background .12s}
    .saved-item-link:hover{background:rgba(134,237,255,.08)}

    .hint{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(134,237,255,.22);letter-spacing:.5px;pointer-events:none;z-index:50;transition:opacity .8s;white-space:nowrap}
    .hint.fade{opacity:0}
    .add-hint{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);font-size:12px;color:rgba(134,237,255,.5);background:rgba(4,14,24,.85);border:1px solid rgba(134,237,255,.2);padding:6px 16px;border-radius:20px;pointer-events:none;z-index:50;opacity:0;transition:opacity .3s;white-space:nowrap}
    .add-hint.show{opacity:1}

    .zoom-ctrl{position:fixed;bottom:22px;right:22px;z-index:100;display:flex;flex-direction:column;gap:4px}
    .z-btn{width:32px;height:32px;border:1px solid rgba(134,237,255,.18);background:rgba(4,14,24,.85);border-radius:8px;cursor:pointer;color:rgba(134,237,255,.7);font-size:18px;display:flex;align-items:center;justify-content:center;line-height:1;transition:background .12s,color .12s}
    .z-btn:hover{background:rgba(134,237,255,.1);color:#86EDFF}
    .add-btn{position:fixed;bottom:110px;right:22px;z-index:100;width:32px;height:32px;border:1px solid rgba(134,237,255,.22);background:rgba(4,14,24,.85);border-radius:8px;cursor:pointer;color:#86EDFF;font-size:20px;display:flex;align-items:center;justify-content:center;line-height:1;transition:background .12s,border-color .12s}
    .add-btn:hover{background:rgba(134,237,255,.1);border-color:rgba(134,237,255,.4)}
    .add-btn.active{background:rgba(134,237,255,.18);border-color:#86EDFF}

    .add-form{position:fixed;z-index:400;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(4,14,24,.98);border:1px solid rgba(134,237,255,.22);border-radius:16px;padding:22px 24px;width:250px;transition:opacity .18s;pointer-events:auto}
    .add-form.hidden{opacity:0;pointer-events:none}
    .add-form-title{font-size:14px;font-weight:600;color:#F0FEFF;margin-bottom:16px}
    .add-form input{width:100%;background:rgba(134,237,255,.05);border:1px solid rgba(134,237,255,.15);border-radius:8px;padding:9px 12px;font-size:13px;color:#E0FEFF;outline:none;margin-bottom:10px;font-family:inherit}
    .add-form input:focus{border-color:rgba(134,237,255,.4)}
    .add-form input::placeholder{color:rgba(134,237,255,.28)}
    .af-row{display:flex;gap:6px;margin-bottom:10px}
    .af-row input{margin-bottom:0}
    .af-btns{display:flex;gap:8px;margin-top:6px}
    .af-btn{flex:1;padding:8px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid rgba(134,237,255,.2);font-family:inherit;transition:background .12s}
    .af-btn.cancel{background:transparent;color:rgba(134,237,255,.5)}
    .af-btn.cancel:hover{background:rgba(134,237,255,.06)}
    .af-btn.ok{background:rgba(134,237,255,.12);color:#86EDFF;border-color:rgba(134,237,255,.35)}
    .af-btn.ok:hover{background:rgba(134,237,255,.22)}
    .drag-tip{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(134,237,255,.2);pointer-events:none;z-index:50;white-space:nowrap;letter-spacing:.3px}
    #universe-vignette{position:fixed;inset:0;z-index:10;pointer-events:none;background:radial-gradient(ellipse 90% 86% at 50% 50%,transparent 56%,rgba(5,10,18,.1) 72%,rgba(5,10,18,.52) 86%,#050A12 98%)}
    .galaxy-nav{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:28px;align-items:flex-start;pointer-events:auto}
    .gn-item{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;background:none;border:none;padding:3px 8px}
    .gn-dot{width:7px;height:7px;border-radius:50%;background:rgba(134,237,255,.15);border:1.5px solid rgba(134,237,255,.22);transition:all .35s;display:block}
    .gn-item.active .gn-dot{background:#86EDFF;box-shadow:0 0 10px rgba(134,237,255,.4);border-color:#86EDFF;width:9px;height:9px}
    .gn-lbl{font-size:9px;color:rgba(134,237,255,.2);letter-spacing:.4px;white-space:nowrap;font-family:-apple-system,sans-serif;transition:color .3s}
    .gn-item.active .gn-lbl{color:rgba(134,237,255,.48)}
    .gn-item:hover .gn-dot{background:rgba(134,237,255,.4)}
    .gn-item:hover .gn-lbl{color:rgba(134,237,255,.38)}
    .connect-done-btn{position:fixed;bottom:152px;right:22px;z-index:100;padding:7px 13px;border-radius:8px;border:1px solid rgba(134,237,255,.35);background:rgba(134,237,255,.12);color:#86EDFF;font-size:11px;cursor:pointer;font-family:inherit;display:none;white-space:nowrap;transition:all .15s}
    .connect-done-btn.show{display:flex;align-items:center;gap:5px}
    .connect-done-btn:hover{background:rgba(134,237,255,.22);border-color:rgba(134,237,255,.5)}
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">PP</div>
    <div class="header-title">여행 아카이브</div>
    <div class="header-stats">
      <div class="hstat"><b>6</b>여행</div>
      <div class="hstat"><b>4</b>개국</div>
      <div class="hstat"><b>40</b>일</div>
    </div>
  </div>

  <div id="universe-wrap">
    <div id="universe">
      <svg id="sky" xmlns="http://www.w3.org/2000/svg" width="13000" height="2500"></svg>
    </div>
  </div>
  <div id="universe-vignette"></div>

  <div class="trip-card hidden" id="trip-card">
    <button class="card-close" id="card-close" aria-label="닫기">×</button>
    <div class="card-user" id="c-user"></div>
    <div class="card-top">
      <div><div class="card-country" id="c-country"></div><div class="card-name" id="c-name"></div></div>
      <div class="card-status-dot" id="c-dot"></div>
    </div>
    <div class="card-when" id="c-when"></div>
    <div class="card-divider"></div>
    <div class="card-nums" id="c-nums"></div>
    <div class="card-prefs" id="c-prefs"></div>
    <div id="c-action"></div>
    <button class="card-save-btn" id="card-save-btn">🔖 저장하기</button>
  </div>

  <button class="save-toggle" id="save-toggle">🔖 저장한 여행 <span class="sc" id="save-count">0</span></button>

  <div class="saved-panel" id="saved-panel">
    <div class="saved-panel-hd">
      <span class="saved-panel-title">저장한 여행</span>
      <button class="saved-panel-close" id="saved-panel-close">×</button>
    </div>
    <div class="saved-list" id="saved-list"></div>
  </div>

  <div class="hint" id="hint">드래그하거나 스크롤하여 다른 여행자의 기록을 탐험하세요</div>
  <div class="add-hint" id="add-hint">빈 공간을 클릭하여 새 별을 추가하세요 · ESC로 취소</div>

  <nav class="galaxy-nav" id="galaxy-nav">
    <button class="gn-item active" data-idx="0"><span class="gn-dot"></span><span class="gn-lbl">내 별자리</span></button>
    <button class="gn-item" data-idx="1"><span class="gn-dot"></span><span class="gn-lbl">세계 여행자</span></button>
    <button class="gn-item" data-idx="2"><span class="gn-dot"></span><span class="gn-lbl">탐험가의 은하</span></button>
  </nav>
  <div class="drag-tip" id="drag-tip">내 별은 드래그로 이동할 수 있어요</div>

  <div class="zoom-ctrl">
    <button class="z-btn" id="zin">+</button>
    <button class="z-btn" id="zout">−</button>
  </div>
  <button class="add-btn" id="add-btn" title="새 별 추가">+</button>
  <button class="connect-done-btn" id="connect-done">✓ 연결 완료</button>

  <div class="add-form hidden" id="add-form">
    <div class="add-form-title">새 여행 추가</div>
    <input id="af-name" placeholder="여행 이름 (예: 방콕 여행)" />
    <div class="af-row">
      <input id="af-country" placeholder="나라" />
      <input id="af-year" placeholder="연도" style="width:80px" />
    </div>
    <div class="af-btns">
      <button class="af-btn cancel" id="af-cancel">취소</button>
      <button class="af-btn ok" id="af-ok">추가하기</button>
    </div>
  </div>

    .forEach(({cx,cy,rx,ry,f,op})=>make('ellipse',{cx,cy,rx,ry,fill:`url(#${f})`,opacity:op||'1'},sky));
    // Galaxy 3 nebulas (center ~11000)
    [{cx:11000,cy:1250,rx:720,ry:590,f:'n-purple'},{cx:10300,cy:900,rx:420,ry:340,f:'n-violet'},{cx:11700,cy:1100,rx:380,ry:300,f:'n-cyan',op:'.8'},{cx:10700,cy:1700,rx:360,ry:280,f:'n-pink'},{cx:12100,cy:1700,rx:300,ry:240,f:'n-teal',op:'.7'},{cx:11500,cy:500,rx:280,ry:220,f:'n-purple',op:'.8'}]
    .forEach(({cx,cy,rx,ry,f,op})=>make('ellipse',{cx,cy,rx,ry,fill:`url(#${f})`,opacity:op||'1'},sky));
    // Void between G2 and G3

    .forEach(({cx,cy,rx,ry,f,op})=>make('ellipse',{cx,cy,rx,ry,fill:`url(#${f})`,opacity:op||'1'},sky));

    const bgG=make('g',{},sky);

      const c=make('circle',{cx:rnd(0,4200).toFixed(1),cy:rnd(0,2500).toFixed(1),r:rnd(.2,1.4).toFixed(2),fill:'white'},bgG);

    for(let i=0;i<220;i++){

      const op=rnd(.1,.48).toFixed(2);c.style.setProperty('--op',op);c.style.opacity=op;
      c.style.animation=`twinkle ${rnd(1.6,6.5).toFixed(1)}s ${rnd(0,9).toFixed(1)}s ease-in-out infinite`;
    }
    // Galaxy 3
    for(let i=0;i<220;i++){
      const c=make('circle',{cx:rnd(9700,13000).toFixed(1),cy:rnd(0,2500).toFixed(1),r:rnd(.2,1.4).toFixed(2),fill:'white'},bgG);
      const op=rnd(.1,.48).toFixed(2);c.style.setProperty('--op',op);c.style.opacity=op;

    // Galaxy labels (very faint)
    [{x:2000,y:2240,t:'GALAXY  I',fill:'rgba(134,237,255,.025)'},{x:7000,y:2240,t:'GALAXY  II',fill:'rgba(255,155,66,.025)'},{x:11000,y:2240,t:'GALAXY  III',fill:'rgba(155,107,255,.025)'}]
    .forEach(({x,y,t,fill})=>{const tx2=make('text',{x,y,'text-anchor':'middle','font-size':'100','font-weight':'700','letter-spacing':'8','font-family':'-apple-system,sans-serif',fill},sky);tx2.textContent=t});

    /* ── MILKY WAY ── */
    const mwG=make('g',{},sky);
    // outer glow band
    const mwOuter=make('rect',{x:'-400',y:'900',width:'5000',height:'500',rx:'250',fill:'rgb(210,225,255)',filter:'url(#mw)',transform:'rotate(-18,2000,1250)'},mwG);

    const mwCore=make('rect',{x:'-400',y:'1020',width:'5000',height:'220',rx:'110',fill:'rgb(235,242,255)',filter:'url(#mw)',transform:'rotate(-18,2000,1250)'},mwG);

      const op=rnd(.18,.58).toFixed(2);c.style.setProperty('--op',op);c.style.opacity=op;
      c.style.animation=`twinkle ${rnd(1.5,5).toFixed(1)}s ${rnd(0,7).toFixed(1)}s ease-in-out infinite`;
    }

    /* ── DISTANT GALAXIES ── */
    [{cx:3720,cy:195,rx:52,ry:19,rot:-32,col:'rgba(218,208,255,1)'},{cx:270,cy:2270,rx:44,ry:16,rot:22,col:'rgba(255,218,175,1)'},{cx:3830,cy:2310,rx:36,ry:13,rot:-16,col:'rgba(175,228,255,1)'}]
    .forEach(({cx,cy,rx,ry,rot,col})=>{
      const g=make('g',{transform:`rotate(${rot},${cx},${cy})`},sky);
      make('ellipse',{cx,cy,rx:rx*2.2,ry:ry*2.2,fill:col,opacity:'.02',filter:'url(#mw)'},g);
      make('ellipse',{cx,cy,rx,ry,fill:col,opacity:'.08',filter:'url(#gx)'},g);
      make('ellipse',{cx,cy,rx:rx*.38,ry:ry*.38,fill:col,opacity:'.25',filter:'url(#glow)'},g);
      make('circle',{cx,cy,r:'2',fill:col,opacity:'.55'},g);
    });

    /* ── SHOOTING STARS ── */
    const ssStyle=document.createElement('style');
    ssStyle.textContent=`
      @keyframes ss1{0%,85%,100%{opacity:0;transform:translate(0,0)}86%{opacity:.8}94%{opacity:0;transform:translate(250px,105px)}}
      @keyframes ss2{0%,50%,100%{opacity:0;transform:translate(0,0)}51%{opacity:.65}57%{opacity:0;transform:translate(190px,80px)}}
      @keyframes ss3{0%,70%,100%{opacity:0;transform:translate(0,0)}71%{opacity:.72}76%{opacity:0;transform:translate(160px,65px)}}
    `;
    document.head.appendChild(ssStyle);
    const ssG=make('g',{},sky);
    [{x:1180,y:365,an:'ss1',dur:'12s',del:'1.5s'},{x:3050,y:640,an:'ss2',dur:'17s',del:'6s'},{x:560,y:1440,an:'ss3',dur:'14s',del:'9s'}]
    .forEach(({x,y,an,dur,del})=>{
      const g=make('g',{},ssG);
      g.style.cssText=`animation:${an} ${dur} ${del} ease-out infinite`;
      make('line',{x1:x,y1:y,x2:x+42,y2:y+18,stroke:'white','stroke-width':'1.3','stroke-linecap':'round'},g);
      make('line',{x1:x+42,y1:y+18,x2:x+85,y2:y+36,stroke:'white','stroke-width':'.45','stroke-linecap':'round','stroke-opacity':'.35'},g);
    });

    /* ── CONSTELLATIONS ── */
    const lineMap={}, coreMap={};
    let hideTimer=null;

    // myLineG: separate layer for my lines (needed for add-star line rendering)
    const myLineG=make('g',{},sky);
    const previewLine=make('line',{x1:0,y1:0,x2:0,y2:0,stroke:'#86EDFF','stroke-opacity':'0','stroke-width':'1.2','stroke-dasharray':'4,7'},myLineG);

    for(const con of CONSTELLATIONS){
      const lineG=con.isMe?myLineG:make('g',{},sky);
      const labelG=make('g',{},sky);
      const starG=make('g',{},sky);
      const byId={};
      for(const t of con.trips)byId[t.id]=t;

      /* Lines */
      for(const[a,b]of con.connections){
        const ta=byId[a],tb=byId[b];
        const key=`${Math.min(a,b)}-${Math.max(a,b)}`;
        lineMap[key]=make('line',{x1:ta.x,y1:ta.y,x2:tb.x,y2:tb.y,stroke:con.color,'stroke-opacity':'.1','stroke-width':'.8','stroke-dasharray':'3,5'},lineG);
      }

      /* User label */
      if(!con.isMe){
        const xs=con.trips.map(t=>t.x),avgX=xs.reduce((a,b)=>a+b,0)/xs.length;
        const topT=con.trips.reduce((a,b)=>a.y<b.y?a:b);
        const ly=topT.y-topT.r-36;
        make('circle',{cx:avgX,cy:ly-8,r:14,fill:con.color,'fill-opacity':'.1',stroke:con.color,'stroke-opacity':'.3','stroke-width':'1'},labelG);
        const iT=make('text',{x:avgX,y:ly-4,'text-anchor':'middle','font-size':'10','font-weight':'600',fill:con.color,'font-family':'-apple-system,sans-serif'},labelG);
        iT.textContent=con.label.replace('@','')[0].toUpperCase();
        const nT=make('text',{x:avgX,y:ly+17,'text-anchor':'middle','font-size':'11',fill:con.color,'fill-opacity':'.6','font-family':'-apple-system,sans-serif','letter-spacing':'-.2'},labelG);
        nT.textContent=con.label;
      }

      /* Stars */
      for(const trip of con.trips){
        const done=trip.status!=='upcoming';
        const g=make('g',{style:'cursor:pointer'},starG);
        const posCircles=[];

        let pulseRing=null;
        if(done){
          const pr=trip.r*3.2;
          pulseRing=make('circle',{cx:trip.x,cy:trip.y,r:pr,fill:'none',stroke:con.color,'stroke-width':'.7'},g);
          pulseRing.style.cssText=`opacity:.22;transform-box:fill-box;transform-origin:center;animation:pulse ${rnd(2.6,4.5).toFixed(1)}s ${rnd(0,3).toFixed(1)}s ease-in-out infinite`;
          posCircles.push(pulseRing);
        }
        const outerRing=make('circle',{cx:trip.x,cy:trip.y,r:trip.r+5,fill:'none',stroke:con.color,'stroke-opacity':done?'.2':'.1','stroke-width':'.7',...(!done?{'stroke-dasharray':'2.5,3'}:{})},g);
        posCircles.push(outerRing);
        const core=make('circle',{cx:trip.x,cy:trip.y,r:trip.r,fill:con.color,'fill-opacity':done?'1':'.35',filter:'url(#glow)'},g);
        posCircles.push(core);
        const label=make('text',{x:trip.x,y:trip.y+trip.r+16,'text-anchor':'middle','font-size':'11',fill:con.color,'fill-opacity':done?'.7':'.35','font-family':'-apple-system,"Apple SD Gothic Neo",sans-serif','letter-spacing':'-.2'},g);
        label.textContent=trip.name;

        coreMap[trip.id]={core,baseR:trip.r,con,trip,circles:posCircles,label,group:g};

        g.addEventListener('mouseenter',()=>{
          if(isDragging||draggingStar!==null||addMode==='place')return;
          if(addMode==='connect'){
            if(!con.isMe||trip.id===connectingStar)return;
            const srcT=ppCon.trips.find(t=>t.id===connectingStar);
            if(srcT){previewLine.setAttribute('x1',srcT.x);previewLine.setAttribute('y1',srcT.y);previewLine.setAttribute('x2',trip.x);previewLine.setAttribute('y2',trip.y)}

          clearTimeout(hideTimer);
          showCard(trip,con);
          setLines(trip.id,con,true);
          core.setAttribute('r',trip.r*1.35);
          core.setAttribute('filter','url(#glow-hot)');
        });
        g.addEventListener('mouseleave',()=>{
          if(addMode==='connect'){core.setAttribute('r',trip.r);core.setAttribute('filter','url(#glow)');return;}
          hideTimer=setTimeout(()=>{
            doHide();setLines(trip.id,con,false);
            core.setAttribute('r',trip.r);
            core.setAttribute('filter','url(#glow)');
          },90);
        });
        g.addEventListener('click',e=>{
          if(addMode!=='connect'||!con.isMe||trip.id===connectingStar)return;
          e.stopPropagation();toggleConnectLine(trip.id);

        /* Touch tap — show card */
        g.addEventListener('touchend',e=>{
          if(touchMoved||addMode==='place'||draggingStar!==null)return;
          if(addMode==='connect'){
            if(con.isMe&&trip.id!==connectingStar){e.preventDefault();toggleConnectLine(trip.id);}
            return;
          }
          e.preventDefault();
          clearTimeout(hideTimer);
          showCard(trip,con);
          setLines(trip.id,con,true);
          core.setAttribute('r',trip.r*1.35);
          core.setAttribute('filter','url(#glow-hot)');
        },{passive:false});

        /* Drag — my stars only */
        if(con.isMe){
          g.addEventListener('mousedown',e=>{
            if(addMode==='connect'){e.stopPropagation();return;}
            if(addMode==='place')return;

    /* ── CARD ── */

    function setLines(tripId,con,on){
      for(const[a,b]of con.connections){
        if(a===tripId||b===tripId){
          const k=`${Math.min(a,b)}-${Math.max(a,b)}`;
          if(lineMap[k]){lineMap[k].setAttribute('stroke-opacity',on?'.5':'.1');lineMap[k].setAttribute('stroke-width',on?'1':'.8')}
        }
      }
    }
    function doHide(){card.classList.remove('visible');card.classList.add('hidden')}
    function showCard(trip,con){
      currentCardTrip=trip; currentCardCon=con; updateSaveBtn();
      const sx=trip.x*zoom+tx,sy=trip.y*zoom+ty;
      const uDiv=document.getElementById('c-user');
      if(con.isMe){uDiv.style.display='none'}
      else{uDiv.style.display='flex';uDiv.innerHTML=`<div class="card-user-dot" style="background:${con.color}"></div><div class="card-user-name" style="color:${con.color}">${con.label}</div>`}
      document.getElementById('c-country').textContent=trip.country;
      document.getElementById('c-name').textContent=trip.name;
      document.getElementById('c-when').textContent=`${trip.year}년 ${trip.month} · ${trip.days}일간`;
      document.getElementById('c-nums').innerHTML=`<div class="cn"><div class="cn-num" style="color:${con.color}">${trip.days}</div><div class="cn-lbl">일간</div></div><div class="cn"><div class="cn-num" style="color:${con.color}">${trip.places}</div><div class="cn-lbl">장소</div></div>`;
      const dot=document.getElementById('c-dot');dot.style.background=con.color;dot.style.color=con.color;
      const prefs=document.getElementById('c-prefs');
      prefs.innerHTML=(trip.prefs||[]).map(p=>`<span class="pref-tag" style="color:${con.color};border-color:${con.color}40;background:${con.color}12">${p}</span>`).join('');
      const action=document.getElementById('c-action');
      if(trip.file)action.innerHTML=`<a href="${trip.file}" class="card-link" style="color:${con.color};border-color:${con.color}40">기록 보기 →</a>`;
      else if(trip.status==='upcoming')action.innerHTML=`<span class="card-upcoming">계획 중</span>`;
      else action.innerHTML='';
      let left=sx+20,top=sy-90;
      if(left+218>W-10)left=sx-230;if(top<72)top=sy+20;if(top+230>H-10)top=H-235;
      card.style.left=left+'px';card.style.top=top+'px';
      card.classList.remove('hidden');card.classList.add('visible');
    }

    /* ── MOVE STAR ── */
    function moveTripStar(tripId,nx,ny){
      const e=coreMap[tripId];
      if(!e)return;
      e.trip.x=nx;e.trip.y=ny;
      for(const c of e.circles){c.setAttribute('cx',nx);c.setAttribute('cy',ny)}
      e.label.setAttribute('x',nx);e.label.setAttribute('y',ny+e.baseR+16);
      for(const[a,b]of e.con.connections){
        if(a===tripId||b===tripId){
          const k=`${Math.min(a,b)}-${Math.max(a,b)}`;
          if(lineMap[k]){
            if(a===tripId){lineMap[k].setAttribute('x1',nx);lineMap[k].setAttribute('y1',ny)}
            else{lineMap[k].setAttribute('x2',nx);lineMap[k].setAttribute('y2',ny)}
          }
        }
      }
    }

    /* ── PAN & ZOOM ── */
    let tx=W/2-2013,ty=H/2-1252,zoom=1;
    let isDragging=false,lastX,lastY,hasDragged=false;
    let draggingStar=null,starDragOX=0,starDragOY=0;

    const GALAXIES=[{cx:2000,cy:1250,zoom:0.85,name:'내 별자리'},{cx:7000,cy:1250,zoom:0.42,name:'세계 여행자'},{cx:11000,cy:1250,zoom:0.42,name:'탐험가의 은하'}];
    let animFrame=null;
    function goToGalaxy(idx){
      const g=GALAXIES[idx];
      const tZoom=g.zoom;
      const tTx=W/2-g.cx*tZoom,tTy=H/2-g.cy*tZoom;
      if(animFrame)cancelAnimationFrame(animFrame);
      const sTx=tx,sTy=ty,sZoom=zoom,t0=performance.now(),dur=1500;
      function step(now){const p=Math.min(1,(now-t0)/dur),e=p<.5?2*p*p:-1+(4-2*p)*p;tx=sTx+(tTx-sTx)*e;ty=sTy+(tTy-sTy)*e;zoom=sZoom+(tZoom-sZoom)*e;applyTransform();if(p<1)animFrame=requestAnimationFrame(step);else animFrame=null}
      animFrame=requestAnimationFrame(step);
    }
    function updateGalaxyNav(){
      const cx=(W/2-tx)/zoom;
      const ni=GALAXIES.reduce((bi,g,i)=>Math.abs(cx-g.cx)<Math.abs(cx-GALAXIES[bi].cx)?i:bi,0);
      document.querySelectorAll('.gn-item').forEach((d,i)=>d.classList.toggle('active',i===ni));
    }
    function applyTransform(){UNI.style.transform=`translate(${tx}px,${ty}px) scale(${zoom})`;updateGalaxyNav()}
    applyTransform();

    const wrap=document.getElementById('universe-wrap');
    wrap.addEventListener('mousedown',e=>{
      // Ignore clicks that originate from fixed UI controls
      if(e.target.closest('#add-btn,.z-btn,#add-form,.trip-card')) return;
      if(addMode==='place'){
        const ux=(e.clientX-tx)/zoom,uy=(e.clientY-ty)/zoom;
        pendingAddPos={x:ux,y:uy};
        document.getElementById('add-form').classList.remove('hidden');
        document.getElementById('af-name').focus();
        return;
      }
      isDragging=true;lastX=e.clientX;lastY=e.clientY;
      document.body.classList.add('dragging');
      if(addMode!=='connect')doHide();
    });
    window.addEventListener('mousemove',e=>{
      if(draggingStar!==null){
        const ux=(e.clientX-tx)/zoom,uy=(e.clientY-ty)/zoom;
        moveTripStar(draggingStar,ux-starDragOX,uy-starDragOY);return;
      }
      if(addMode==='connect'&&connectingStar!==null){
        const srcT=ppCon.trips.find(t=>t.id===connectingStar);
        if(srcT){const ux=(e.clientX-tx)/zoom,uy=(e.clientY-ty)/zoom;previewLine.setAttribute('x1',srcT.x);previewLine.setAttribute('y1',srcT.y);previewLine.setAttribute('x2',ux);previewLine.setAttribute('y2',uy)}
      }
      if(!isDragging)return;
      tx+=e.clientX-lastX;ty+=e.clientY-lastY;lastX=e.clientX;lastY=e.clientY;
      applyTransform();
      if(!hasDragged){hasDragged=true;document.getElementById('hint').classList.add('fade')}
    });
    window.addEventListener('mouseup',()=>{
      if(draggingStar!==null){draggingStar=null;document.body.classList.remove('star-drag');return}
      isDragging=false;document.body.classList.remove('dragging');
    });


    /* Touch */
    let lastTX,lastTY,lastPinch=null;
    let touchMoved=false,touchStartCX=0,touchStartCY=0;
    wrap.addEventListener('touchstart',e=>{
      if(e.touches.length===1){isDragging=true;lastTX=e.touches[0].clientX;lastTY=e.touches[0].clientY;touchMoved=false;touchStartCX=e.touches[0].clientX;touchStartCY=e.touches[0].clientY;doHide()}
      else if(e.touches.length===2){isDragging=false;lastPinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)}
      e.preventDefault();
    },{passive:false});
    wrap.addEventListener('touchmove',e=>{
      if(e.touches.length===1){if(Math.hypot(e.touches[0].clientX-touchStartCX,e.touches[0].clientY-touchStartCY)>6)touchMoved=true;}
      if(e.touches.length===1&&isDragging){tx+=e.touches[0].clientX-lastTX;ty+=e.touches[0].clientY-lastTY;lastTX=e.touches[0].clientX;lastTY=e.touches[0].clientY;applyTransform();if(!hasDragged){hasDragged=true;document.getElementById('hint').classList.add('fade')}}
      else if(e.touches.length===2&&lastPinch){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);doZoom(d/lastPinch,(e.touches[0].clientX+e.touches[1].clientX)/2,(e.touches[0].clientY+e.touches[1].clientY)/2);lastPinch=d}
      e.preventDefault();
    },{passive:false});
    wrap.addEventListener('touchend',()=>{isDragging=false;lastPinch=null});

    wrap.addEventListener('wheel',e=>{e.preventDefault();doZoom(e.deltaY>0?.92:1.09,e.clientX,e.clientY)},{passive:false});
    document.getElementById('zin').addEventListener('click',()=>doZoom(1.2,W/2,H/2));
    document.getElementById('zout').addEventListener('click',()=>doZoom(.8,W/2,H/2));
    function doZoom(f,cx,cy){const nz=Math.max(.3,Math.min(3,zoom*f));const ux=(cx-tx)/zoom,uy=(cy-ty)/zoom;zoom=nz;tx=cx-ux*zoom;ty=cy-uy*zoom;applyTransform()}

    /* ── ADD STAR MODE ── */
    let addMode=false,pendingAddPos=null;
    let nextId=600;

    document.getElementById('add-btn').addEventListener('click',()=>{
      if(addMode==='connect'){doneConnect();return;}
      const entering=addMode!=='place';
      addMode=entering?'place':false;
      document.body.classList.toggle('add-mode',!!addMode);
      document.getElementById('add-btn').classList.toggle('active',!!addMode);
      document.getElementById('add-hint').classList.toggle('show',!!addMode);
      document.getElementById('hint').classList.toggle('fade',!!addMode||hasDragged);
      if(!addMode)document.getElementById('add-form').classList.add('hidden');
    });

    document.getElementById('af-cancel').addEventListener('click',cancelAdd);
    document.getElementById('af-ok').addEventListener('click',confirmAdd);
    document.getElementById('af-name').addEventListener('keydown',e=>e.key==='Enter'&&confirmAdd());
    document.addEventListener('keydown',e=>{if(e.key==='Escape'&&addMode)cancelAdd()});

    function cancelAdd(){
      if(addMode==='connect'){doneConnect();return;}
      addMode=false;pendingAddPos=null;
      document.body.classList.remove('add-mode');
      document.getElementById('add-btn').classList.remove('active');
      document.getElementById('add-hint').classList.remove('show');
      document.getElementById('add-form').classList.add('hidden');
      document.getElementById('af-name').value='';
      document.getElementById('af-country').value='';
      document.getElementById('af-year').value='';
    }

    function confirmAdd(){
      const name=document.getElementById('af-name').value.trim()||'새 여행';
      const country=document.getElementById('af-country').value.trim()||'미정';
      const year=parseInt(document.getElementById('af-year').value)||new Date().getFullYear();
      if(!pendingAddPos)return;
      const {x,y}=pendingAddPos;
      const newId=addTripStar(x,y,name,country,year);
      pendingAddPos=null;
      document.getElementById('add-form').classList.add('hidden');
      document.getElementById('af-name').value='';
      document.getElementById('af-country').value='';
      document.getElementById('af-year').value='';
      enterConnectMode(newId);
    }

    function addTripStar(x,y,name,country,year){
      const id=nextId++;
      const r=5;
      const trip={id,name,country,year,month:'',days:0,places:0,status:'completed',x,y,r};
      ppCon.trips.push(trip);

      const starG=make('g',{},sky);
      const posCircles=[];
      const g=make('g',{style:'cursor:pointer'},starG);

      const pr=r*3.2;
      const ring=make('circle',{cx:x,cy:y,r:pr,fill:'none',stroke:'#86EDFF','stroke-width':'.7'},g);
      ring.style.cssText=`opacity:.22;transform-box:fill-box;transform-origin:center;animation:pulse 3.2s ease-in-out infinite`;
      posCircles.push(ring);
      const outerRing=make('circle',{cx:x,cy:y,r:r+5,fill:'none',stroke:'#86EDFF','stroke-opacity':'.2','stroke-width':'.7'},g);
      posCircles.push(outerRing);
      const core=make('circle',{cx:x,cy:y,r,fill:'#86EDFF',filter:'url(#glow)'},g);
      posCircles.push(core);
      const label=make('text',{x,y:y+r+16,'text-anchor':'middle','font-size':'11',fill:'#86EDFF','fill-opacity':'.7','font-family':'-apple-system,sans-serif','letter-spacing':'-.2'},g);
      label.textContent=name;

      coreMap[id]={core,baseR:r,con:ppCon,trip,circles:posCircles,label,group:g};

      // drag
      g.addEventListener('mousedown',e=>{
        if(addMode==='connect'){e.stopPropagation();return;}
        e.stopPropagation();e.preventDefault();
        draggingStar=id;
        const ux=(e.clientX-tx)/zoom,uy=(e.clientY-ty)/zoom;
        starDragOX=ux-trip.x;starDragOY=uy-trip.y;
        doHide();document.body.classList.add('star-drag');
      });
      g.addEventListener('mouseenter',()=>{
        if(isDragging||draggingStar!==null||addMode==='place')return;
        if(addMode==='connect'){
          if(id===connectingStar)return;
          const srcT=ppCon.trips.find(t=>t.id===connectingStar);
          if(srcT){previewLine.setAttribute('x1',srcT.x);previewLine.setAttribute('y1',srcT.y);previewLine.setAttribute('x2',trip.x);previewLine.setAttribute('y2',trip.y)}
          core.setAttribute('r',r*1.35);core.setAttribute('filter','url(#glow-hot)');
          return;
        }
        clearTimeout(hideTimer);showCard(trip,ppCon);
        setLines(id,ppCon,true);
        core.setAttribute('r',r*1.35);core.setAttribute('filter','url(#glow-hot)');
      });
      g.addEventListener('mouseleave',()=>{
        if(addMode==='connect'){core.setAttribute('r',r);core.setAttribute('filter','url(#glow)');return;}
        hideTimer=setTimeout(()=>{doHide();setLines(id,ppCon,false);core.setAttribute('r',r);core.setAttribute('filter','url(#glow)')},90);
      });
      g.addEventListener('click',e=>{
        if(addMode!=='connect'||id===connectingStar)return;
        e.stopPropagation();toggleConnectLine(id);
      });

      core.style.animation='none';
      setTimeout(()=>{core.style.animation=''},50);
      return id;
    }

    let connectingStar=null;

    function enterConnectMode(newId){
      addMode='connect';connectingStar=newId;
      document.body.classList.remove('add-mode');
      document.getElementById('add-btn').classList.remove('active');
      document.getElementById('add-hint').textContent='클릭으로 별자리를 연결하세요 · 완료 버튼으로 종료';
      document.getElementById('add-hint').classList.add('show');
      document.getElementById('connect-done').classList.add('show');
      previewLine.setAttribute('stroke-opacity','.35');
      const e=coreMap[newId];
      if(e){e.core.setAttribute('filter','url(#glow-hot)');e.core.setAttribute('r',e.baseR*1.6)}
    }

    function doneConnect(){
      const e=coreMap[connectingStar];
      if(e){e.core.setAttribute('filter','url(#glow)');e.core.setAttribute('r',e.baseR)}
      addMode=false;connectingStar=null;
      document.getElementById('add-btn').classList.remove('active');
      document.getElementById('add-hint').classList.remove('show');
      document.getElementById('add-hint').textContent='빈 공간을 클릭하여 새 별을 추가하세요 · ESC로 취소';
      document.getElementById('connect-done').classList.remove('show');
      previewLine.setAttribute('stroke-opacity','0');
    }

    function toggleConnectLine(targetId){
      const newId=connectingStar;
      const key=`${Math.min(newId,targetId)}-${Math.max(newId,targetId)}`;
      const existIdx=ppCon.connections.findIndex(([a,b])=>(a===newId&&b===targetId)||(a===targetId&&b===newId));
      if(existIdx>=0){
        ppCon.connections.splice(existIdx,1);
        if(lineMap[key]){lineMap[key].remove();delete lineMap[key]}
      }else{
        const srcT=ppCon.trips.find(t=>t.id===newId);
        const tgtT=ppCon.trips.find(t=>t.id===targetId);
        ppCon.connections.push([newId,targetId]);
        lineMap[key]=make('line',{x1:srcT.x,y1:srcT.y,x2:tgtT.x,y2:tgtT.y,stroke:'#86EDFF','stroke-opacity':'.55','stroke-width':'1','stroke-dasharray':'3,5'},myLineG);
        setTimeout(()=>lineMap[key]&&lineMap[key].setAttribute('stroke-opacity','.1'),700);
      }
    }

    document.getElementById('connect-done').addEventListener('click',doneConnect);
    document.querySelectorAll('.gn-item').forEach(btn=>btn.addEventListener('click',()=>goToGalaxy(+btn.dataset.idx)));

    // hide drag tip after first drag
    setTimeout(()=>document.getElementById('drag-tip').style.opacity='0',8000);

    /* ── SAVED TRIPS ── */
    let savedTrips=JSON.parse(localStorage.getItem('kmin_saved')||'[]');
    let currentCardTrip=null,currentCardCon=null;

    function isSaved(tripId,conId){return savedTrips.some(s=>s.tripId===tripId&&s.conId===conId)}

    function updateSaveBtn(){
      const btn=document.getElementById('card-save-btn');
      if(!btn||!currentCardTrip)return;
      const saved=isSaved(currentCardTrip.id,currentCardCon.id);
      btn.innerHTML=saved?'🔖 저장됨':'🔖 저장하기';
      btn.classList.toggle('saved',saved);
    }

    function updateSaveCount(){
      document.getElementById('save-count').textContent=savedTrips.length;
    }

    function renderSavedList(){
      const list=document.getElementById('saved-list');
      if(savedTrips.length===0){
        list.innerHTML='<div class="saved-empty">아직 저장한 여행이 없어요<br>별을 클릭해서 마음에 드는<br>여행을 저장해보세요 🔖</div>';
        return;
      }
      list.innerHTML=savedTrips.map((s,i)=>`
        <div class="saved-item">
          <div class="saved-item-top">
            <div class="saved-item-name">${s.name}</div>
            <button class="saved-item-rm" data-idx="${i}" title="삭제">×</button>
          </div>
          <div class="saved-item-meta">${s.country} · ${s.year} · <span style="color:${s.conColor}">${s.conLabel}</span></div>
          ${s.prefs&&s.prefs.length?`<div class="saved-item-prefs">${s.prefs.map(p=>`<span class="saved-item-tag" style="color:${s.conColor};border-color:${s.conColor}40;background:${s.conColor}12">${p}</span>`).join('')}</div>`:''}
          ${s.file?`<a href="${s.file}" class="saved-item-link">기록 보기 →</a>`:''}
        </div>`).join('');
      list.querySelectorAll('.saved-item-rm').forEach(btn=>{
        btn.addEventListener('click',e=>{
          e.stopPropagation();
          savedTrips.splice(+btn.dataset.idx,1);
          localStorage.setItem('kmin_saved',JSON.stringify(savedTrips));
          updateSaveCount(); renderSavedList(); updateSaveBtn();
        });
      });
    }

    document.getElementById('card-save-btn').addEventListener('click',()=>{
      if(!currentCardTrip||!currentCardCon)return;
      const idx=savedTrips.findIndex(s=>s.tripId===currentCardTrip.id&&s.conId===currentCardCon.id);
      if(idx>=0){savedTrips.splice(idx,1)}
      else{savedTrips.push({tripId:currentCardTrip.id,conId:currentCardCon.id,name:currentCardTrip.name,country:currentCardTrip.country,year:currentCardTrip.year,file:currentCardTrip.file||'',prefs:currentCardTrip.prefs||[],conLabel:currentCardCon.label,conColor:currentCardCon.color})}
      localStorage.setItem('kmin_saved',JSON.stringify(savedTrips));
      updateSaveBtn(); updateSaveCount();
      if(document.getElementById('saved-panel').classList.contains('open'))renderSavedList();
    });

    const savedPanel=document.getElementById('saved-panel');
    document.getElementById('save-toggle').addEventListener('click',()=>{
      savedPanel.classList.toggle('open');
      if(savedPanel.classList.contains('open'))renderSavedList();
    });
    document.getElementById('saved-panel-close').addEventListener('click',()=>savedPanel.classList.remove('open'));

    updateSaveCount();
  </script>
</body>
</html>
